---
fr:
  mindo-chocolate-makers: "[Mindo Chocolate Makers](https://mindochocolate.com/) a
    un lien très fort avec le Michigan, où a lieu la plus grande partie de la production.
    Le cacao vient cepandant d’Équateur et son histoire a commencé à Mindo. Avant
    l’explosion du chocolat équatorien, deux américains ont ouvert un café internet
    à Mindo. Pour faire du brownie, ils ramenaient du chocolat… des USA. Conscients
    du paradoxe d’importer du chocolat au pays du cacao, ils ont tenté de produire
    eux-mêmes leur chocolat depuis les graines de cacao… et c’est ainsi que serait
    né Mindo Chocolate Makers. Ils ont ensuite fondé leur usine à Dexter, Michigan.
    Je ne suis pas certain, mais je crois que les barres que nous avons achetés à
    Mindo viennent de l’atelier de production original de Mindo (celui que nous avons
    visité). \nIl est impossible d'acheter ces chocolats à Quito, mais on peut les
    commander en Équateur ainsi qu'aux États Unis (pour deux fois le prix!)."
  chaman: |-
    Je pense avoir mis la main sur une des dernières tablettes de cette marque: c'est la barre de chocolat distribuée par [Cacao & Cacao](https://kacaoshop.com/), une petite boutique spécialisée en chocolat à Quito. Ils y vendent toujours d'autres marques de chocolat, ainsi que du café et du cacao pur. C'est là d'ailleurs que je l'ai achetée en décembre 2021, et qu'ils m'ont dit que c'était les derniers modèles.

    Un petit doute cependant, car selon la boîte, elle serait élaborée par [La Leyenda del chocolate](http://chocoleyenda.com/) de Calderon... Mais il m'est impossible de trouver la marque dans leur boutique.
  lindt: Tout le monde connaît [Lindt](https://www.lindt-spruengli.com/), la compagnie
    internationale de chocolat fin et de truffes suisses. Les tablettes Excellence
    sont disponibles dans presque toutes les épiceries!
  mashpi: "[Mashpi Chocolate Artesanal](https://tienda.chocomashpi.com/) produit son
    chocolat proche de Mindo, dans la vallée de la rivière Mashpi. C'est une plantation
    familiale de cacao qui promeut l'agriculture biologique, la permaculture et la
    participation de la communauté aux alentours. C'est aussi une ferme touristique.
    On trouve surtout ses produits à Mindo et Mashpi. En décembre 2021, nous en avons
    trouvé quelques uns au magasin [Wayuro Organico](https://www.facebook.com/wayruro.organico/)
    à Quito. Vous pouvez aussi les commander pour une livraison à Quito ou Guayaquil."
  millesime: "[Millésime Chocolat](https://www.millesime-chocolat.be/fr/) est une
    marque belge de chocolat de luxe, dirigée par Jean Christophe Hubert. Je crois
    comprendre que chaque année, les barres disponibles changent, probablement selon
    les millésimes des cacaos. Nous avons trouvé la tablette Équateur présentée sur
    ce site à la [fromagerie Yannick](https://www.yannickfromagerie.ca/) sur la rue
    Bernard, à Montréal."
  pacari: "[Paccari](www.paccari.com), anciennement appelé Pacari, est une compagnie
    familiale fondée en 2002, qui produit du chocolat biologique et équitable. Ils
    furent parmi les premiers à parier sur le cacao arriba pour une production à grand
    volume. Les barres Paccari ont depuis gagné (et gagnent toujours) quantité de
    prix à l'international. \n\nLe terme \"Paccari\", en Quechua, signifie \"nature\"
    et \"réveil\", et son logo représente un hieroglyphe d'homme-arbre, vieux de plus
    de 5000 ans, appartenant à la culture Valdivienne de la côte équatorienne.\n\nPaccari
    mise aussi sur une agriculture soutenable et le support des familles de fermiers
    qui produisent le cacao arriba. En particulier, selon [cette entrevue](https://cocoarunners.com/maker/pacari/),
    ils ne font affaire qu'avec de petits producteurs, qu'ils encouragent à suivre
    la voie de la permaculture et de cultiver d'autres plantes à côté du cacao.\n\nLe
    chocolat Paccari est vendu dans plus de 60 pays du monde, entre autres au Canada
    depuis 2020: à Montréal, on peut le trouver chez Rachel Berri, et en Ontario chez
    Metro."
  republica-del-cacao: |-
    [Republica del Cacao](https://republicadelcacao.com) est fondée en 2007 par deux frères équatoriens qui apprennent à Paris que le meilleur cacao selon un chocolatier reconnu vient de la région de Guayaquil. Décidés à prendre à exploiter le potentiel du cacao équatorien de manière locale et soutenable, ils offrent d'abord des tablettes pour le consommateur puis en 2014 du cacao fin pour les entreprises. Ils diversifient ensuite leurs sources, allant chercher de nouvelles saveurs de cacao fino d'aroma au Pérou, en République Dominicaine et en Colombie.

    À ce que je sache, les barres de Republica del Cacao sont surtout basées sur du cacao nacional arriba, mais aussi parfois du Sacha. Il est possible qu'ils aillent chercher d'autres espèces - ce sera toujours du fino d'aroma.
  yumbos: "[Yumbos Chocolate](http://yumboschocolate.com/) est une fabrique de chocolat
    à Mindo. Elle est fondée par un couple: Claudia Ponce et Pierre-Alain Molinari.
    Le cacao provient des provinces de Los Rios et d'Esmeraldas. On peut visiter l'atelier
    à Mindo, ou acheter leurs produits à leur boutique dans le centre historique de
    Quito."
  nat-kaw: |-
    [Nat Kaw](https://www.nativaromas.com/natkaw), le chocolat de Nativaromas, provient de petites fermes dans la province de Manabi. Chaque ferme produit un type de cacao unique, résultat d'un mélange naturel réalisé par pollinisation croisée de différentes espèces endémiques de cacao fino de aroma. Le procédé de fermentation est aussi adapté à la micro-faune de chaque ferme. Chaque type de barre provient de sa ferme particulière, et à donc un profil différent sans saveurs ajoutées: fruité, floral, ou herbes.
    Ces chocolats ont tous été primés en 2021. Je crois donc que c'est une marque très récente. En décembre 2021, nous avons trouvé ces barres au magasin [Cacao & Cacao](https://kacaoshop.com/) à Quito.
  teaone: "[Teaone](https://teaone.ec/) est une petite production familiale, établie
    au bord de la riviève Teaone dans l'écosystème unique du Choco Andin, proche de
    la ville d'Esmeraldas et de l'océan Pacifique. Ils ont d'ailleurs une boutique
    entre deux stations balnéaires sur le bord de l'eau, à Playa Escondida. En décembre
    2021, on a trouvé leurs barres au magasin [Wayuro Organico](https://www.facebook.com/wayruro.organico/)
    à Quito."
  raqeri: "[RaqEri](https://www.facebook.com/RAQERICACAO/) est une toute petite marque
    qui produit des produits de cacao comme du salami et du thé de cacao. Je l'ai
    trouvée dans une petite foire de Noël de 2021 à Quito."
  cleo-s: |-
    Le site internet: la page [Facebook](https://www.facebook.com/cleos.tortillas) de Cleo's tortillas. La [vidéo promotionelle](https://www.youtube.com/watch?v=SlsUV0VwxxI) produite par l'ambassade du Mexique en Équateur. Les points de vente à Quito? La petite [fruteria don Vic](https://foursquare.com/v/la-fruteria/4bcb58a6b6c49c745d019291/photos) sur la Gonzalez Suarez.

    De ce que j'ai compris, Cleotilde Gascon est une mexicaine établie à Quito, qui produit quelques aliments, dont du chocolat. Qui est par ailleurs excellent. Pour prendre contact avec elle, le numéro est dans la description de la vidéo promotionelle!
  galletti: "[Galletti](https://cafegalletti.com/) est une marque de café équatorienne.
    Cependant, si vous visitez leur café sur la Gonzalez Suarez à Quito, vous trouverez
    leur chocolat maison. Il n'est pas affiché sur le site équatorien, mais on le
    trouve sur le [site de vente](https://cafegallettiusa.com/collections/products/products/variety-pack-of-each-fine-chocolate-bar-1)
    aux États-Unis."
  kallari: |-
    [Kallari](https://www.kallari.com.ec/) est une entreprise communautaire, née de l'association de producteurs locaux et quechuas situés dans la région de la rivière Napo, en Amazonie. C'est autour de cette région que se trouve la plus grande diversité génétique de cacao. Ce serait aussi là que la consommation et la culture du cacao serait apparue, selon des recherches historiques. Certains peuples le cultiveraient depuis plus de 5000 ans, selon la le système agricole ancestral du [chakra](https://www.kallari.com.ec/campana-chakra-mujer-y-chocolate). Le chakra implique une gestion agricole des ressources naturelles selon la cosmovision des Quechuas. Les femmes y tiennent un rôle de leader, comme gardiennes du savoir ancestral, garantes de la sécurité alimentaire et administratrices de l'espace de production.
    Kallari est donc partie prenante de la campagne Chakra, femme et chocolat, soutenue entre autres par la province de Napo et l'Union Européenne, qui a pour objectif de promouvoir ces éléments de culture de manière intégrale, aux niveaux local et international.

    Ils vendent plusieurs types de chocolats, certains faits à partir de cacao nacional arriba, d'autres de Sacha. Les tablettes ne sont pas disponibles en magasin à Quito, mais on peut les commander. On peut aussi trouver des tablettes par hasard lors de visites dans la jungle: mon premier contact, c'était sur un étal de produits d'artisanat d'une communauté vivant proche de l'arrêt lunch d'un circuit de rafting à Baños..!
  chicao: "[Chicao](https://www.facebook.com/chicaochocolate/) est une petite ferme
    touristique autour de la rivière Silanche, proche de Puerto Quito, sur le flanc
    des Andes qui descendent vers la côte Pacifique. Ils utilisent l'agroforesterie,
    c'est à dire la cultivation du cacao en forêt, afin d'enrichir leurs chocolat
    des arômes de la forêt. Chicao se veut aussi un centre d'étude du cacao arriba,
    et sont parfois visités par des universités et collèges locaux et internationaux.
    Le nom de Chicao vient d'un joli oiseau jaune de la forêt de nuages, l'oriole
    noir et or."
  arawi: "[Arawi](https://www.arawicacao.com/) est une compagnie fondée en 2010 à
    Cuenca, qui produit plusieurs types de barres de cacao nacional fino d'aroma biologique.
    On peut trouver leurs barres entre autres aux supermarchés Supermaxi et Coral."
  belly-s: "[Belly's Cocoa](https://www.chocolatesbellyscocoa.com/) se spécialise
    dans le cacao fin d'arôme d'altitude, c'est à dire, cultivé à plus de 1000 mètres
    d'altitude dans le choco andino, écosystème protégé proche de Quito. Pour réussir
    à produire du cacao dans ces conditions, il aura fallu de nombreuses années de
    recherche et de sélection génétique. À la base provenant de la famille CCN-51,
    dont la qualité est inférieure au cacao fin d'arôme, le nommé [Rio Alambi](https://cocoaflavormap.cacaomovil.com/site/place/rio-alambi)
    présente des caractéristiques uniques. \nOn m'a donné des tablettes Belly's. On
    peut en commander depuis Quito, sur leur site internet."
  valdivian: "[Valdivian](https://www.facebook.com/ValdivianChocolate) doit son nom
    à une des plus vieilles civilisations d'Équateur, qui vivait sur la côte ouest,
    proche de Guayaquil. Ils utilisent du cacao arriba biologique provenant de plusieurs
    régions, et distribuent leurs barres dans tous les SuperMaxi."
  minka: '[Minka Chocolate](https://minkachocolate.com/) est vendu en Équateur, mais
    aussi aux États-Unis et en France. Minka veut dire "travail d''équipe" en Quechua,
    la langue inca. Le cacao provient de plantations dans la province de Guayas, proche
    de la rivière Naranjal.'
  kamm: '[Kamm](https://www.kammhere.com/) est une marque assez particulière. Le chocolat
    y est vendu comme un produit de santé et de bien-être, surtout accompagné de cristaux
    de "super aliments" comme le gingembre et le citron (pour relaxer), la mangue
    (pour l''énergie), le caramel (pour le sourire) et le chanvre (pour... la santé).
    Et puis aussi, mais juste vendu aux USA, le CBD (pour relaxer et être heureux,
    bien sur). Qu''à cela ne tienne, leur super aliment de base, c''est du cacao fin
    d''arôme équatorien, alors ça vaut la peine d''essayer!'
  yaussa: La ferme touristique [Yaussa](https://yaussa.com/) est située à Puerto Quito
    et propose, entre autres produits, deux tablettes de chocolat arriba et du chocolat
    100% pour la cuisine. Nous l'avons trouvée dans une foire de Noël à Cumbaya, en
    2021.
  avanaa: "[Avanaa](https://www.avanaa.ca/) est une chocolaterie montréalaise située
    à Villeray, qui confectionne du chocolat à partir de fèves de cacaos directement
    importées de producteurs durables, venant de différents endroits dans le monde,
    dont l'Équateur avec du cacao Kallari!"
  legast: |-
    [Legast](https://www.legastchocolatier.com/home) est une chocolaterie belgo-colombien basée à Braine le Compte, en Wallonie. En plus des traditionnelles pralines et macarons, ils y proposent plusieurs tablettes de chocolat noir dont le cacao provient de différents coins d'Amérique Latine, dont évidemment une d'Équateur avec du cacao arriba nacional.
    J'ai trouvé cette tablette lors d'un voyage à Bruxelles, à la boutique The Belgium Chocolate Factory de la Galerie du Roy.
  hoja-verde: "[Hoja Verde](https://www.facebook.com/hojaverdechocolate/) est la branche
    chocolat d'une compagnie familiale qui produit aussi des [roses](https://www.hojaverde.com.ec/?lang=en).
    Elle est aussi associée à la compagnie de [café Velez](https://www.hvg.com.ec/).
    On trouve leur produits un peu partout à Quito, entre autres au café Velez de
    la Floresta."
  arariwa: '[Arariwa](https://www.arariwacacao.com/) est une petite entreprise équatorienne
    menée par des femmes, dont le nom signifie "gardiennes des Chakras", soit la manière
    traditionnelle de gérer la production de cacao par les femmes (voir la partie
    sur Kallari pour plus de détails). On trouve leurs tablettes dans certaines foires
    de produits fins, au marché artisanal, ou chez chez [Cacao & Cacao](https://kacaoshop.com/).'
  witoca: "[Witoca](http://www.witoca.com/) est une communauté d'Amazonie qui produit
    surtout du café, mais aussi du [chocolat](https://producersmarket.com/product/chocolate-witoca-9ed1bde281984307ab1920dc197261c4)
    de manière artisanale, selon le sytème Chakra. J'ai trouvé une tablette au marché
    artisanal de Quito."
  mayta: "[Mayta](https://maytagourmet.com/es/) est une compagnie qui décrit son chocolat
    comme un produit gourmet, de luxe, mais les tablettes sont abordables. Son chocolat,
    fin d'arôme, provient de différentes régions: Amazonie, Esmeraldas ou Puerto Quito.
    On peut commander des tablettes sur leur site internet pour l'Équateur ou les
    États-Unis. À Quito, j'ai trouvé leur chocolat en magasin chez [Cacao & Cacao](https://kacaoshop.com/)."
  rights: "[Rights](https://rightschocolates.com/) est une compagnie qui met de l'avant
    l'inclusivité, en employant des personnes vivant avec des handicaps physiques
    ou intellectuels et en produisant du chocolat à partir du cacao fin d'arome de
    manière équitable. Ses tablettes se retrouvent entre autres dans les supermarchés
    SuperMaxi."
  conexion: "[Conexion](https://www.conexionchocolate.com/), compagnie équatorienne
    et américaine, a comme objectif de mettre de l'avant le chocolat artisanal et
    équitable fait à partir du chocolat arriba. Visant le marché d'amateurs de chocolat
    fin américain, on peut en commander des tablettes aux États-Unis. À Quito, j'ai
    trouvé leur chocolat chez [Cacao & Cacao](https://kacaoshop.com/), une petite
    boutique de chocolats équatoriens à visiter absolument."
  chococumi: '[Choco Cumi](www.facebook.com/TalitaChocoCumi/) est une petite marque
    née de la fondation [Talita Cumi] (https://www.facebook.com/MujeresValientesTalitaCumi/)
    qui vient en aide aux mères monoparentales. L''objectif est double: en plus de
    valoriser le cacao fin équatorien avec des chocolats uniques, l''entreprise, créée
    en 2016 ou 2017, cherche à émanciper par l''emploi des femmes qui ont vécu des
    violences et se trouvent en situation de vulnérabilité. La marque se définit donc
    comme celles des "femmes du chocolat". En 2022, je n''ai trouvé leur chocolat
    qu''au marché artisanal. Il est possible qu''ils aient depuis étendu leurs points
    de vente.'
  monarque: "[Monarque](https://chocolats-monarque.square.site/) est une autre petite
    chocolaterie montréalaise, bean-to-bar, basée au Mile End, dont le cacao provient
    surtout d'Amérique centrale et latine. J'ai trouvé ses barres d'Équateur dans
    la boutique [État de Choc](https://www.etatdechoc.com/fc/), située sur St-Laurent."
  mestizo: |-
    Il y a peu d'information sur le site internet de [Mestizo](https://beacons.ai/mestizo). Peu de choses aussi sur leur [Facebook](https://www.facebook.com/profile.php?id=100076049232989). Les emballages des tablettes parlent simplement de cacao fino d'aroma d'Équateur et de commerce équitable avec de petits producters. Cependant, un détail permet d'allr chercher plus loin: c'est produit par "PapaCacao" à Pomasqui. PapaCacao? Un détective trouverait [ici](https://www.culturaypatrimonio.gob.ec/wp-content/uploads/downloads/2023/07/Agenda-Cultural-y-Patrimonial-14-al-27-JUL-2023-V3.pdf) un article de l'agenda culturel du gouvernement Équatorien qui met de l'avant [Jaime Freire](https://www.linkedin.com/in/jaime-freire-gonz%C3%A1lez-24995858/?originalSubdomain=ec), surnommé Papa Cacao, qui serait à l'origine du projet de réactivation du cacao nacional arriba et fino d'aroma du gouvernement Équatorien dans les années 2010 et qui a depuis formé plusieurs chocolatiers équatoriens.
    Quel est le lien exact entre Mestizo et Papa Cacao? À creuser. En tout cas, j'ai trouvé ces tablettes dans une boutique du Pasaje Arzobispal, situé au coeur du centre historique de Quito.
  huma: "[Huma](https://humachocolate.com/) produit du chocolat Single Origin à partir
    de cacao acheté directement des producteurs venant de plusieurs régions d'Équateur,
    comme Guayaquil, Tsachila, Montanita, Cotopaxi, Quitu, et Yasuni. Ce n'est pas
    du cacao arriba, mais bien du fino d'aroma. J'ai trouvé leurs tablettes dans une
    boutique du Pasaje Arzobispal, situé au coeur du centre historique de Quito."
  leyenda: "[La Leyenda del Chocolate](http://chocoleyenda.com/) est à découvrir -
    je n'ai encore pas acheté de barre de cette marque!"
  washu: |-
    [Washu](https://www.washuchocolate.com/) est un projet qui vise à donner des opportunités économiques aux communautés vivant dans la forêt primaire du Tesoro Escondido. En vivant de la forêt de manière durable, ces communautés protégent ainsi 250 hectares du chocó equatorien. Cet écosystème en danger abrite nombre d'espèces en voie d'extinction, incluant le singe araignée à tête noire dont le nom en langue Chicha est Washu. Ce singe fait partie des 25 primates les plus à risques au monde et est l'espèce la plus menacée du pays.

    Cette initiative fait partie d'une initiative plus globale menée par [Projecto Washu](https://www.proyectowashu.org/), qui y fait aussi de l'éducation, recherche scientifique, et conservation.
  winak: "[Wiñak](https://www.winak.org/?lang=en) est une autre entreprise communautaire
    associée à Chakra, femme et chocolat. J'ai pu commander de leurs tablettes à Quito
    en les contactant par courriel."
  victory: |-
    [Victory Ecuadorian Product](https://www.victoryecuadorianproduct.com/) semble une petite entreprise de chocolat équatorien qui a commencé en 2022 avec des bonbons pralines et qui produit aussi quelques barres de chocolat. Il est écrit sur leur page [Facebook](https://www.facebook.com/photo/?fbid=171233948834851&set=pcb.171234272168152) que le cacao est le CCN51, soit la plus commune et productive des espèces de cacao, cependant, qu'ils choisissent le cacao de plus haute qualité, le fino d'aroma.
    Nous avons trouvé leurs barres dans le café d'une des tours de la Basilica del Voto Nacional, au centre historique.
  viferchi: Lancée en 2018 à Cuenca, [Viferchi](http://www.viferchi.com/) propose
    pour le moment une petite variété de barres. J'ai mis la main dessus à Quito,
    à la même fruteria que les barres Cleo's, en décembre 2021. Je suppose cependant
    qu'elle est appelée à grandir.
  malky: "[Malky](https://www.facebook.com/yuramuyo/) est un projet sur lequel il
    n'existe que peu d'information. Il semble (mais je peux me tromper) qu'il s'agit
    d'une entreprise fondée par une femme Kichwa, Senaida Cerda, afin de soutenir
    les femmes dans les communautés d'Amazonie. C'est relié, de près ou de loin, au
    projet [Woman of the Rio Napo](https://www.rainforestpartnership.org/projects/women-of-the-rio-napo)
    du Rainforest Partnership. Selon l'emballage des tablettes, il y a aussi un lien
    avec l'entreprise [Valenco](https://valenco.com.ec/), qui produit entre autres
    du chocolat fin d'arôme pour les chocolatiers. \nJ'ai trouvé une tablette au Pasaje
    Arzobispal du centre historique de Quito."
en:
  mindo-chocolate-makers: "[Mindo Chocolate Makers](https://mindochocolate.com/) has
    a strong connection to Michigan, where most of the production takes place. The
    cocoa, however, comes from Ecuador and its history began in Mindo. Before the
    Ecuadorian chocolate explosion, two Americans opened an internet café in Mindo.
    To make brownies, they brought chocolate... from the USA. Aware of the paradox
    of importing chocolate to the country of cocoa, they tried to produce their own
    chocolate from cocoa seeds... and that's how Mindo Chocolate Makers was born.
    They then founded their factory in Dexter, Michigan. I'm not sure, but I believe
    the bars we bought from Mindo came from the original Mindo production facility
    (the one we visited). \nYou can't buy these chocolates in Quito, but you can order
    them in Ecuador as well as in the United States (for twice the price!)."
  chaman: |-
    I think I got my hands on one of the last bars of this brand: it's the chocolate bar distributed by [Cacao & Cacao](https://kacaoshop.com/), a small store specialized in chocolate in Quito. They always sell other chocolate brands, as well as coffee and pure cocoa. That's where I bought it, and they told me it was the latest available.

    I have a little doubt, however, because according to the box, it was made by [La Leyenda del chocolate](http://chocoleyenda.com/) by Calderon... But it is impossible for me to find the brand in their store.
  lindt: Everyone knows [Lindt](https://www.lindt-spruengli.com/), the international
    fine chocolate and Swiss truffle company. Excellence bars are available in almost
    every grocery store!
  mashpi: "[Mashpi Chocolate Artesanal](https://tienda.chocomashpi.com/) produces
    its chocolate near Mindo, in the Mashpi River Valley. It is a family cocoa plantation
    that promotes organic farming, permaculture and community participation in the
    surrounding area. It is also a tourist farm. You can find its products in Mindo
    and Mashpi. We also found them at the [Wayuro Organico shop](https://www.facebook.com/wayruro.organico/)
    in Quito. You can also order them to be delivered in Quito or Guayaquil."
  millesime: "[Millésime Chocolat](https://www.millesime-chocolat.be/fr/) is a Belgian
    luxury chocolate brand, run by Jean Christophe Hubert. I understand that each
    year the available bars change, probably depending on the vintage of the cocoa.
    We found the Ecuador bar presented on this site at the [fromagerie Yannick](https://www.yannickfromagerie.ca/)
    on Bernard Street, in Montreal."
  pacari: "[Pacari (www.pacari.com) is a family owned and operated company founded
    in 2002 that produces organic and fair trade chocolate. They were among the first
    to bet on arriba cocoa for high volume production. Pacari bars have since won
    (and are still winning) many international awards. \n\nThe term \"Pacari\", in
    Quechua, means \"nature\" and \"awakening\", and its logo represents a hieroglyph
    of man-tree, more than 5000 years old, belonging to the Valdivian culture of the
    Ecuadorian coast.\n\nPacari also relies on sustainable agriculture and the support
    of the farming families who produce arriba cocoa. In particular, according to
    [this interview](https://cocoarunners.com/maker/pacari/), they only deal with
    small producers, whom they encourage to follow the permaculture path and grow
    other crops alongside cocoa.\n\nPacari chocolate is sold in over 60 countries
    around the world, including Canada since 2020: in Montreal, it can be found at
    Rachel Berri, and in Ontario at Metro."
  republica-del-cacao: |-
    [Republica del Cacao](https://republicadelcacao.com) was founded in 2007 by two Ecuadorian brothers who learned in Paris that the best cocoa according to a renowned chocolatier comes from the Guayaquil region. Determined to take advantage of the potential of Ecuadorian cocoa in a local and sustainable way, they first offer bars for the consumer and then in 2014 fine cocoa for companies. They then diversified their sources, going to Peru, the Dominican Republic and Colombia for new flavors of aroma fino cacao.

    As far as I know, Republica del Cacao's bars are mostly based on nacional arriba cocoa, but sometimes Sacha as well. They may go for other species - it will always be fino d'aroma.
  yumbos: "[Yumbos Chocolate](http://yumboschocolate.com/) is a chocolate factory
    in Mindo. It was founded by a couple: Claudia Ponce and Pierre-Alain Molinari.
    The cocoa comes from the provinces of Los Rios and Esmeraldas. You can visit the
    workshop in Mindo, or buy their products at their store in the historical center
    of Quito."
  nat-kaw: |-
    [Nat Kaw](https://www.nativaromas.com/natkaw), Nativaromas' chocolate, comes from small farms in the province of Manabi. Each farm produces a unique type of cocoa, the result of a natural blend achieved through cross-pollination of different endemic species of aroma fino cocoa. The fermentation process is also adapted to the micro-fauna of each farm. Each type of bar comes from its own farm, and therefore has a different profile without added flavors: fruity, floral, or herbal.
    These chocolates have all won awards in 2021, so I think it's a very new brand. In December 2021, we found these bars at the [Cacao & Cacao](https://kacaoshop.com/) store in Quito.
  teaone: "[Teaone](https://teaone.ec/) is a small family production, established
    on the Teaone River in the unique ecosystem of the Andean Choco, near the town
    of Esmeraldas and the Pacific Ocean. They also have a store between two resorts
    on the waterfront, in Playa Escondida. In December 2021, we found their bars at
    the store [Wayuro Organico](https://www.facebook.com/wayruro.organico/) in Quito."
  raqeri: "[RaqEri](https://www.facebook.com/RAQERICACAO/) is a very small brand that
    produces cocoa products like salami and cocoa tea. I found it in a small Christmas
    fair of 2021 in Quito."
  cleo-s: |-
    Website: Cleo's tortillas [Facebook](https://www.facebook.com/cleos.tortillas) page. [Promotional video](https://www.youtube.com/watch?v=SlsUV0VwxxI) produced by the Mexican Embassy in Ecuador. Sales points in Quito? The little [fruteria don Vic](https://foursquare.com/v/la-fruteria/4bcb58a6b6c49c745d019291/photos) on Gonzalez Suarez.

    From what I understand, Cleotilde Gascon is a Mexican established in Quito, who produces a few food items, including arriba chocolate. Which is by the way excellent. To contact her, the number is in the description of the promotional video!
  galletti: "[Galletti](https://cafegalletti.com/) is an Ecuadorian coffee brand.
    However, if you visit their cafe on Gonzalez Suarez in Quito, you will find their
    homemade chocolate. It is not listed on the Ecuadorian site, but it can be found
    on the [sales site](https://cafegallettiusa.com/collections/products/products/variety-pack-of-each-fine-chocolate-bar-1)
    for the United States."
  kallari: |-
    [Kallari](https://www.kallari.com.ec/) is a community-based company, born from the association of local and Quechua producers located around the Napo River in the Amazon. It is around this region that the greatest genetic diversity of cocoa is found. It is also where the consumption and cultivation of cocoa appeared, according to historical research. Some people have been cultivating it for more than 5000 years, following the ancestral agricultural system of the [chakra](https://www.kallari.com.ec/campana-chakra-mujer-y-chocolate). The chakra implies an agricultural management of natural resources according to the cosmology of the Quechuas. Women play a leading role as guardians of ancestral knowledge, guarantors of food security and administrators of the production space.
    Kallari is therefore part of the Chakra, Womn and Chocolate campaign, supported by the province of Napo and the European Union, among others, which aims to promote these elements of culture in an integral way, both locally and internationally.

    They sell several types of chocolates, some made from nacional arriba cocoa, others from Sacha. The bars are not available in stores in Quito, but they can be ordered. You can also find bars by chance during visits in the jungle: my first contact was on a stall of handicrafts of a community living near the lunch stop of a rafting tour in Baños...!
  chicao: "[Chicao (https://www.facebook.com/chicaochocolate/) is a small tourist
    farm around the Silanche River, near Puerto Quito, on the slopes of the Andes
    that descend to the Pacific coast. They use agroforestry, that is to say the cultivation
    of cocoa in the forest, in order to enrich their chocolate with the aromas of
    the woods. Chicao is also a center for the study of arriba cocoa, and is sometimes
    visited by local and international universities and colleges. The name Chicao
    comes from a beautiful yellow bird of the cloud forest, the black and gold oriole."
  arawi: "[Arawi](https://www.arawicacao.com/) is a company founded in 2010 in Cuenca,
    which produces several types of bars of organic aroma nacional fino cocoa. You
    can find their bars in Supermaxi and Coral supermarkets, among others."
  belly-s: "[Belly's Cocoa](https://www.chocolatesbellyscocoa.com/) specializes in
    high-altitude fine flavor cocoa, cultivated at over 1000 meters above sea level
    in the Andean Chocó, a protected ecosystem near Quito. To successfully produce
    cocoa in these conditions, it required many years of research and genetic selection.
    Originally from the CCN-51 family, whose quality is inferior to fine flavor cocoa,
    the named [Rio Alambi](https://cocoaflavormap.cacaomovil.com/site/place/rio-alambi)
    presents unique characteristics. I was given Belly's chocolate bars. You can order
    them from Quito on their website."
  valdivian: "[Valdivian](https://www.facebook.com/ValdivianChocolate) owes its name
    to one of the oldest civilizations in Ecuador, which lived on the west coast,
    near Guayaquil. They use organic arriba cocoa from several regions, and distribute
    their bars in all SuperMaxi stores."
  minka: '[Minka Chocolate](https://minkachocolate.com/) is sold in Ecuador, but also
    in the United States and France. Minka means "teamwork" in Quechua, the Inca language.
    The cocoa comes from plantations in the province of Guayas, near the Naranjal
    River.'
  kamm: '[Kamm](https://www.kammhere.com/) is a rather unusual brand. Chocolate is
    sold as a health and wellness product, especially accompanied by crystals of "superfoods"
    like ginger and lemon (to relax), mango (for energy), caramel (for smiling) and
    hemp (for... health). And also, but only sold in the USA, CBD (to relax and be
    happy, of course). In any case, their superfood staple is fine Ecuadorian flavored
    cocoa, so it''s worth a try!'
  yaussa: Met in a Christmas fair, the tourist farm [Yaussa](https://yaussa.com/)
    is located in Puerto Quito and offers, among other products, two arriba chocolate
    bars and 100% chocolate for cooking.
  avanaa: "[Avanaa](https://www.avanaa.ca/en/) is a Montreal based chocolate factory
    located in Villeray. Their chocolate bars are crafted from cocoa beans directly
    imported from sustainable producers from everywhere in the world. This includes
    Ecuador, with Kallari cocoa!"
  legast: "[Legast](https://www.legastchocolatier.com/home) is a Belgian-Colombian
    chocolatier based in Braine le Compte, Wallonia. In addition to traditional pralines
    and macarons, they offer several dark chocolate bars with cocoa sourced from various
    parts of Latin America, including, of course, one from Ecuador with arriba nacional
    cocoa. I found this bar during a trip to Brussels, at The Belgium Chocolate Factory
    store in Galerie du Roy."
  hoja-verde: "[Hoja Verde](https://www.facebook.com/hojaverdechocolate/) is the chocolate
    branch of a family company that also produces [roses](https://www.hojaverde.com.ec/?lang=en).
    It is also associated with the [Velez coffee](https://www.hvg.com.ec/) company.
    Their products can be found everywhere in Quito, among others at the Velez Café
    in La Floresta."
  arariwa: '[Arariwa](https://www.arariwacacao.com/) is a small Ecuadorian company
    led by women, whose name means "guardians of the Chakras," representing the traditional
    way of managing cocoa production by women (refer to the section on Kallari for
    more details). You can find their chocolate bars at certain gourmet fairs, the
    artisanal market, or at [Cacao & Cacao](https://kacaoshop.com/).'
  witoca: "[Witoca](http://www.witoca.com/) is a community in the Amazon that primarily
    produces coffee but also crafts [chocolate](https://producersmarket.com/product/chocolate-witoca-9ed1bde281984307ab1920dc197261c4)
    using the Chakra system. I found a chocolate bar at the artisanal market in Quito."
  rights: "[Rights](https://rightschocolates.com/) is a company that promotes inclusivity
    by employing individuals living with physical or intellectual disabilities and
    producing chocolate from fine flavor cocoa in a fair-trade manner. Its chocolate
    bars can be found, among other places, in SuperMaxi supermarkets."
  conexion: "[Conexion](https://www.conexionchocolate.com/), an Ecuadorian and American
    company, aims to promote artisanal and fair-trade chocolate made from arriba chocolate.
    Targeting the market of American fine chocolate enthusiasts, you can order their
    chocolate bars in the United States. In Quito, I found their chocolate at [Cacao
    & Cacao](https://kacaoshop.com/), a must-visit small shop for Ecuadorian chocolates."
  chococumi: '[Choco Cumi](www.facebook.com/TalitaChocoCumi/) is a small brand born
    from the [Talita Cumi](https://www.facebook.com/MujeresValientesTalitaCumi/) foundation,
    which assists single mothers. The dual objective is to valorize Ecuadorian fine
    flavor cocoa with unique chocolates and to empower women who have experienced
    violence and are in vulnerable situations. The brand, established in 2016 or 2017,
    defines itself as the "women of chocolate." In 2022, I found their chocolate only
    at the artisanal market. They may have expanded their points of sale since then.'
  monarque: "[Monarque](https://chocolats-monarque.square.site/) is another small
    bean-to-bar chocolate shop based in Mile End, Montreal, sourcing its cocoa mainly
    from Central and Latin America. I found its Ecuadorian bars at the [État de Choc](https://www.etatdechoc.com/fc/)
    store on St-Laurent."
  mestizo: 'There is limited information on the [Mestizo](https://beacons.ai/mestizo)
    website, and not much on their [Facebook](https://www.facebook.com/profile.php?id=100076049232989)
    page either. The packaging of the bars simply mentions Ecuadorian fino de aroma
    cocoa and fair trade with small producers. However, a detail invites further investigation:
    it is produced by "PapaCacao" in Pomasqui. PapaCacao? A detective would find [here](https://www.culturaypatrimonio.gob.ec/wp-content/uploads/downloads/2023/07/Agenda-Cultural-y-Patrimonial-14-al-27-JUL-2023-V3.pdf)
    an article in the Ecuadorian government''s cultural agenda that highlights [Jaime
    Freire](https://www.linkedin.com/in/jaime-freire-gonz%C3%A1lez-24995858/?originalSubdomain=ec),
    nicknamed Papa Cacao, who is said to be the originator of the Ecuadorian government''s
    project to reactivate arriba nacional and fino de aroma cocoa in the 2010s and
    has since trained several Ecuadorian chocolatiers. What is the exact connection
    between Mestizo and Papa Cacao? That remains to be explored. In any case, I found
    these bars in a shop in Pasaje Arzobispal, located in the heart of the historic
    center of Quito.'
  huma: "[Huma](https://humachocolate.com/) produces Single Origin chocolate from
    cocoa purchased directly from producers in various regions of Ecuador, such as
    Guayaquil, Tsachila, Montanita, Cotopaxi, Quitu, and Yasuni. It's not arriba cocoa
    but rather fino de aroma. I found their chocolate bars in a shop in Pasaje Arzobispal,
    located in the heart of the historic center of Quito."
  leyenda: "[La Leyenda del Chocolate](http://chocoleyenda.com/) is yet to be discovered
    - I haven't bought a bar from this brand yet!"
  winak: "[Wiñak](https://www.winak.org/?lang=en) is another community enterprise
    associated with Chakra, focusing on women and chocolate. I was able to order their
    chocolate bars in Quito by contacting them via email."
  victory: "[Victory Ecuadorian Product](https://www.victoryecuadorianproduct.com/)
    appears to be a small Ecuadorian chocolate company that started in 2022 with praline
    candies and also produces some chocolate bars. It is stated on their [Facebook](https://www.facebook.com/photo/?fbid=171233948834851&set=pcb.171234272168152)
    page that they use CCN51 cocoa, the most common and productive cocoa species,
    but they select the highest quality, fino de aroma cocoa. We found their bars
    in the cafe of one of the towers of the Basilica del Voto Nacional, in the historic
    center."
  viferchi: Launched in 2018 in Cuenca, [Viferchi](http://www.viferchi.com/) offers
    a small variety of bars for now. I got my hands on it in Quito, at the same fruteria
    as Cleo's bars. I assume, however, that it will grow.
  malky: "[Malky](https://www.facebook.com/yuramuyo/) is a project with limited available
    information. It appears (though I may be mistaken) to be an enterprise founded
    by a Kichwa woman, Senaida Cerda, with the aim of supporting women in Amazonian
    communities. It is somehow connected, closely or loosely, to the [Woman of the
    Rio Napo](https://www.rainforestpartnership.org/projects/women-of-the-rio-napo)
    project by Rainforest Partnership. According to the packaging of the chocolate
    bars, there is also a link to the company [Valenco](https://valenco.com.ec/),
    which produces, among other things, fine flavor chocolate for chocolatiers. I
    found a chocolate bar at Pasaje Arzobispal in the historic center of Quito."
es:
  mindo-chocolate-makers: "[Mindo Chocolate Makers](https://mindochocolate.com/) tiene
    una fuerte conexión con Michigan, donde tiene lugar la mayor parte de la producción.
    El cacao, sin embargo, procede de Ecuador y su historia comenzó en Mindo. Antes
    de la explosión del chocolate en Ecuador, dos estadounidenses abrieron un cibercafé
    en Mindo. Para hacer brownies, trajeron chocolate... de Estados Unidos. Conscientes
    de la paradoja de importar chocolate en la tierra del cacao, intentaron producir
    su propio chocolate a partir de las habas de cacao... y así nació Mindo Chocolate
    Makers. A continuación, instalaron su fábrica en Dexter, Michigan. No estoy seguro,
    pero creo que las barras que compramos en Mindo procedían de la planta de producción
    original de Mindo (la que visitamos). \nNo se pueden comprar estos chocolates
    en Quito, pero se pueden encargar en Ecuador y en Estados Unidos (¡por el doble
    de precio!)."
  chaman: |-
    Creo que me hice con una de las últimas tabletas de esta marca: es la tableta de chocolate que distribuye [Cacao & Cacao](https://kacaoshop.com/), una pequeña chocolatería de Quito. Allí siempre venden otras marcas de chocolate, así como café y cacao puro. Allí lo compré en diciembre de 2021 y me dijeron que eran los últimos modelos.

    Una pequeña duda sin embargo, porque según la caja, fue hecho por [La Leyenda del chocolate](http://chocoleyenda.com/) por Calderón... Pero no encuentro la marca en su tienda.
  lindt: Todo el mundo conoce [Lindt](https://www.lindt-spruengli.com/), la empresa
    internacional de chocolate fino y trufas de Suiza. Las barras Excellence están
    disponibles en casi todas las tiendas de comestibles.
  mashpi: "[Mashpi Chocolate Artesanal](https://tienda.chocomashpi.com/) produce su
    chocolate cerca de Mindo, en el valle del río Mashpi. Se trata de una plantación
    familiar de cacao que promueve la agricultura ecológica, la permacultura y la
    participación comunitaria en los alrededores. También es una granja turística.
    Sus productos se encuentran principalmente en Mindo y Mashpi. En diciembre de
    2021, encontramos algunos de ellos en la tienda [Wayuro Orgánico](https://www.facebook.com/wayruro.organico/)
    en Quito. También se pueden pedir para entregar en Quito o Guayaquil."
  millesime: "[Millésime Chocolat](https://www.millesime-chocolat.be/fr/) es una marca
    belga de chocolate de lujo, dirigida por Jean Christophe Hubert. Tengo entendido
    que cada año las barras disponibles cambian, probablemente dependiendo de la cosecha
    del cacao. Encontramos la barra de Ecuador que aparece en este sitio en [fromagerie
    Yannick](https://www.yannickfromagerie.ca/) en la calle Bernard de Montreal."
  pacari: "[Pacari](www.pacari.com), es una empresa familiar fundada en 2002, que
    produce chocolate ecológico y de comercio justo. Fueron de los primeros en apostar
    por el cacao de arriba para una producción de gran volumen. Desde entonces, las
    barras Pacari han ganado (y siguen ganando) muchos premios internacionales. \n\nEl
    término \"Pacari\", en quechua, significa \"naturaleza\" y \"despertar\", y su
    logotipo representa un jeroglífico de hombre-árbol de 5000 años de antigüedad
    perteneciente a la cultura valdiviana de la costa ecuatoriana.\n\nPacari también
    confía en la agricultura sostenible y en el apoyo a las familias de agricultores
    que producen cacao de arriba. En concreto, según [esta entrevista](https://cocoarunners.com/maker/pacari/),
    sólo tratan con pequeños productores, a los que animan a seguir el camino de la
    permacultura y a cultivar otros productos junto al cacao.\n\nEl chocolate Pacari
    se vende en más de 60 países de todo el mundo, incluido Canadá desde 2020: en
    Montreal, se puede encontrar en Rachel Berri, y en Ontario en Metro."
  republica-del-cacao: |-
    [República del Cacao](https://republicadelcacao.com) fue fundada en 2007 por dos hermanos ecuatorianos que aprendieron en París que el mejor cacao, según un reputado chocolatero, proviene de la región de Guayaquil. Decididos a explotar el potencial del cacao ecuatoriano de forma local y sostenible, primero ofrecieron barritas para los consumidores y luego, en 2014, cacao fino para las empresas. A continuación, diversificaron sus fuentes, yendo a Perú, la República Dominicana y Colombia en busca de nuevos sabores de cacao fino de aroma.

    Por lo que sé, las barritas de República del Cacao se basan sobre todo en el cacao nacional de arriba, pero a veces también en el Sacha. Pueden optar por otras especies - siempre será fino d'aroma.
  yumbos: "[Yumbos Chocolate](http://yumboschocolate.com/) es una fábrica de chocolate
    en Mindo. Fue fundada por una pareja: Claudia Ponce y Pierre-Alain Molinari. El
    cacao procede de las provincias de Los Ríos y Esmeraldas. Se puede visitar el
    taller en Mindo, o comprar sus productos en su tienda en el centro histórico de
    Quito."
  nat-kaw: |-
    [Nat Kaw](https://www.nativaromas.com/natkaw), el chocolate de Nativaromas, procede de pequeñas explotaciones de la provincia de Manabí. Cada finca produce un tipo de cacao único, resultado de una mezcla natural lograda por la polinización cruzada de diferentes especies endémicas de cacao fino de aroma. El proceso de fermentación también se adapta a la microfauna de cada explotación. Cada tipo de barrita procede de su explotación particular y, por tanto, tiene un perfil diferente sin sabores añadidos: frutal, floral o herbal.
    Todos estos chocolates han sido premiados en 2021. Así que creo que es una marca muy nueva. En diciembre de 2021, encontramos estas barras en la tienda [Cacao & Cacao](https://kacaoshop.com/) en Quito.
  teaone: "[Teaone](https://teaone.ec/) es una pequeña producción familiar, establecida
    en las orillas del río Teaone, en el ecosistema único del Choco andino, cerca
    de la ciudad de Esmeraldas y del Océano Pacífico. También tienen una tienda entre
    dos complejos turísticos frente al mar en Playa Escondida. En diciembre de 2021,
    sus barras se encontraban en la tienda [Wayuro Orgánico] (https://www.facebook.com/wayruro.organico/)
    en Quito."
  raqeri: "[RaqEri](https://www.facebook.com/RAQERICACAO/) es una marca muy pequeña
    que produce productos de cacao como salami y té de cacao. Lo encontré en una pequeña
    feria navideña en 2021 en Quito."
  cleo-s: |-
    La página web: Cleo's tortillas [Facebook] (https://www.facebook.com/cleos.tortillas). El [video promocional](https://www.youtube.com/watch?v=SlsUV0VwxxI), producido por la Embajada de México en Ecuador. ¿Dónde comprarlos en Quito? La pequeña [frutería don Vic](https://foursquare.com/v/la-fruteria/4bcb58a6b6c49c745d019291/photos) en González Suárez.

    Por lo que tengo entendido, Cleotilde Gascón es una mexicana afincada en Quito, que produce algunos alimentos, entre ellos el chocolate. Lo que también es excelente. Para contactar con ella, el número está en la descripción del vídeo promocional.
  galletti: "[Galletti](https://cafegalletti.com/) es una marca de café ecuatoriana.
    Sin embargo, si se visita su cafetería en González Suárez, en Quito, se encontrará
    con su chocolate casero. No aparece en el sitio ecuatoriano, pero se puede encontrar
    en el [sitio de ventas](https://cafegallettiusa.com/collections/products/products/variety-pack-of-each-fine-chocolate-bar-1)
    en los Estados Unidos."
  kallari: |-
    [Kallari](https://www.kallari.com.ec/) es una empresa comunitaria, creada por la asociación de productores locales y quechuas situados en la región del río Napo, en la Amazonia. La mayor diversidad genética del cacao se encuentra en esta región. También es aquí donde se originó el consumo y el cultivo del cacao, según las investigaciones históricas. Algunos pueblos llevan cultivando cacao desde hace más de 5.000 años, según el sistema agrícola ancestral de la [chakra] (https://www.kallari.com.ec/campana-chakra-mujer-y-chocolate). El chakra implica el manejo agrícola de los recursos naturales según la cosmovisión de los quechuas. Las mujeres tienen un rol protagónico como custodias del conocimiento ancestral, garantes de la seguridad alimentaria y administradoras del espacio productivo.
    Por ello, Kallari forma parte de la campaña Chakra, Mujer y Chocolate, apoyada por la provincia de Napo y la Unión Europea, entre otros, que pretende promover estos elementos de la cultura de forma integral, tanto a nivel local como internacional.

    Venden varios tipos de chocolate, algunos hechos con cacao nacional de arriba, otros de Sacha. Las barras no están disponibles en las tiendas de Quito, pero se pueden encargar. También se pueden encontrar bares por casualidad cuando se visita la selva: ¡mi primer contacto fue en un puesto de artesanía de una comunidad que vive cerca de la parada del almuerzo de una excursión de rafting en Baños!
  chicao: "[Chicao](https://www.facebook.com/chicaochocolate/) es una pequeña finca
    turística en torno al río Silanche, cerca de Puerto Quito, en las laderas de los
    Andes que descienden hasta la costa del Pacífico. Utilizan la agroforestería,
    es decir, el cultivo de cacao en el bosque, para enriquecer su chocolate con los
    sabores de la foresta. Chicao es también un centro de estudio del cacao arriba,
    y a veces lo visitan universidades y colegios locales e internacionales. El nombre
    de Chicao proviene de un hermoso pájaro amarillo del bosque nublado, la oropéndola
    negra y dorada."
  arawi: "[Arawi](https://www.arawicacao.com/) es una empresa fundada en 2010 en Cuenca,
    que produce varios tipos de barras de cacao fino nacional de aroma orgánico. Sus
    barras se pueden encontrar en los supermercados Supermaxi y Coral, entre otros."
  belly-s: |-
    [Belly's Cocoa](https://www.chocolatesbellyscocoa.com/) se especializa en cacao fino de aroma de altura, es decir, cultivado a más de 1000 metros de altura en el chocó andino, un ecosistema protegido cerca de Quito. Para lograr producir cacao en estas condiciones, se necesitaron muchos años de investigación y selección genética. Inicialmente proveniente de la familia CCN-51, cuya calidad es inferior al cacao fino de aroma, el llamado [Rio Alambi](https://cocoaflavormap.cacaomovil.com/site/place/rio-alambi) presenta características únicas.

    Me regalaron tabletas de Belly's. Puedes hacer pedidos desde Quito a través de su sitio web.
  valdivian: "[Valdivian](https://www.facebook.com/ValdivianChocolate) lleva el nombre
    de una de las civilizaciones más antiguas de Ecuador, que vivía en la costa occidental,
    cerca de Guayaquil. Utilizan cacao ecológico de arriba de varias regiones y distribuyen
    sus barritas en todas las tiendas SuperMaxi."
  minka: '[Minka Chocolate](https://minkachocolate.com/) se vende en Ecuador, pero
    también en Estados Unidos y Francia. Minka significa "trabajo en equipo" en quechua,
    la lengua inca. El cacao procede de plantaciones de la provincia de Guayas, cerca
    del río Naranjal.'
  kamm: '[Kamm](https://www.kammhere.com/) es una marca bastante especial. El chocolate
    se vende como un producto de salud y bienestar, especialmente con cristales de
    "superalimentos" como el jengibre y el limón (para la relajación), el mango (para
    la energía), el caramelo (para sonreír) y el cáñamo (para... la salud). Y también,
    pero sólo se vende en EEUU, el CBD (para relajarse y ser feliz, claro). No importa,
    su alimento básico es el cacao fino de aroma ecuatoriano, y ¡vale la pena probarlo!'
  yaussa: La granja turística [Yaussa](https://yaussa.com/) se encuentra en Puerto
    Quito y ofrece, entre otros productos, dos tabletas de chocolate de arriba y chocolate
    100% para cocinar. Lo encontramos en una feria de Navidad en Cumbayá en 2021.
  avanaa: "[Avanaa](https://www.avanaa.ca/) es una chocolatería de Montreal ubicada
    en Villeray, que elabora chocolate a partir de granos de cacao importados directamente
    de productores sostenibles de diversas partes del mundo, incluido Ecuador con
    cacao Kallari."
  legast: "[Legast](https://www.legastchocolatier.com/home) es una chocolatería belgo-colombiana
    con sede en Braine le Compte, Valonia. Además de las tradicionales pralinas y
    macarons, ofrecen varias tabletas de chocolate negro cuyo cacao proviene de diversas
    regiones de América Latina, incluyendo Ecuador con cacao arriba nacional. Encontré
    esta tableta durante un viaje a Bruselas, en la tienda The Belgium Chocolate Factory
    de la Galerie du Roy."
  hoja-verde: "[Hoja Verde](https://www.facebook.com/hojaverdechocolate/) es la rama
    chocolatera de una empresa familiar que también produce [rosas](https://www.hojaverde.com.ec).
    También está asociada a la empresa [café Vélez] (https://www.hvg.com.ec/). Sus
    productos se pueden encontrar en todo Quito, entre otros en la cafetería Vélez
    de la Floresta."
  arariwa: '[Arariwa](https://www.arariwacacao.com/) es una pequeña empresa ecuatoriana
    liderada por mujeres, cuyo nombre significa "guardianas de los Chakras", haciendo
    referencia a la forma tradicional en que las mujeres gestionan la producción de
    cacao (consultar la sección sobre Kallari para más detalles). Sus tabletas se
    encuentran en algunas ferias de productos gourmet, en el mercado artesanal o en
    [Cacao & Cacao](https://kacaoshop.com/).'
  witoca: "[Witoca](http://www.witoca.com/) es una comunidad amazónica que se especializa
    en la producción de café, pero también elabora [chocolate](https://producersmarket.com/product/chocolate-witoca-9ed1bde281984307ab1920dc197261c4)
    de forma artesanal, utilizando el sistema Chakra. Encontré una tableta en el mercado
    artesanal de Quito."
  mayta: "[Mayta](https://maytagourmet.com/es/) es una empresa que describe su chocolate
    como un producto gourmet y de lujo, pero con tabletas asequibles. Su chocolate,
    de fino aroma, proviene de diversas regiones como la Amazonía, Esmeraldas o Puerto
    Quito. Se pueden realizar pedidos de tabletas a través de su sitio web para Ecuador
    o los Estados Unidos. En Quito, encontré sus chocolates en la tienda [Cacao &
    Cacao](https://kacaoshop.com/)."
  rights: "[Rights](https://rightschocolates.com/) es una empresa que promueve la
    inclusividad al emplear a personas con discapacidades físicas o intelectuales
    y producir chocolate a partir de cacao fino de aroma de manera equitativa. Sus
    tabletas se encuentran, entre otros lugares, en los supermercados SuperMaxi."
  conexion: "[Conexión](https://www.conexionchocolate.com/), una empresa ecuatoriano-americana,
    tiene como objetivo destacar el chocolate artesanal y equitativo elaborado a partir
    de cacao arriba. Dirigido al mercado de los amantes del chocolate fino en América,
    se pueden pedir tabletas en los Estados Unidos. En Quito, encontré sus chocolates
    en [Cacao & Cacao](https://kacaoshop.com/), una pequeña tienda de chocolates ecuatorianos
    que definitivamente vale la pena visitar."
  chococumi: '[Choco Cumi](www.facebook.com/TalitaChocoCumi/) es una pequeña marca
    que surge de la fundación [Talita Cumi](https://www.facebook.com/MujeresValientesTalitaCumi/),
    la cual brinda apoyo a madres solteras. El objetivo es doble: además de destacar
    el cacao fino ecuatoriano con chocolates únicos, la empresa, fundada en 2016 o
    2017, busca empoderar a mujeres que han experimentado violencia y se encuentran
    en situación de vulnerabilidad, a través del empleo. La marca se autodenomina
    como la de las "mujeres del chocolate". Hasta 2022, solo encontré sus chocolates
    en el mercado artesanal. Es posible que hayan ampliado sus puntos de venta desde
    entonces.'
  monarque: "[Monarque](https://chocolats-monarque.square.site/) es otra pequeña chocolatería
    de Montreal, bean-to-bar, con sede en Mile End, cuyo cacao proviene principalmente
    de América Central y Latina. Encontré sus barras de chocolate ecuatoriano en la
    tienda [État de Choc](https://www.etatdechoc.com/fc/), ubicada en St-Laurent."
  mestizo: 'Hay poca información en el sitio web de [Mestizo](https://beacons.ai/mestizo).
    También hay poca información en su [Facebook](https://www.facebook.com/profile.php?id=100076049232989).
    Los envases de las tabletas simplemente hablan de cacao fino de aroma de Ecuador
    y comercio justo con pequeños productores. Sin embargo, un detalle permite investigar
    más a fondo: está producido por "PapaCacao" en Pomasqui. ¿PapaCacao? Un detective
    encuentraría [aquí](https://www.culturaypatrimonio.gob.ec/wp-content/uploads/downloads/2023/07/Agenda-Cultural-y-Patrimonial-14-al-27-JUL-2023-V3.pdf)
    un artículo en la agenda cultural del gobierno ecuatoriano que destaca a [Jaime
    Freire](https://www.linkedin.com/in/jaime-freire-gonz%C3%A1lez-24995858/?originalSubdomain=ec),
    apodado Papa Cacao, quien supuestamente está detrás del proyecto de reactivación
    del cacao nacional arriba y fino de aroma del gobierno ecuatoriano en la década
    de 2010 y que ha formado a varios chocolateros ecuatorianos desde entonces. ¿Cuál
    es el vínculo exacto entre Mestizo y Papa Cacao? Es algo que se debe investigar.
    En cualquier caso, encontré estas tabletas en una tienda del Pasaje Arzobispal,
    ubicado en el corazón del centro histórico de Quito.'
  huma: "[Huma](https://humachocolate.com/) produce chocolate Single Origin a partir
    de cacao comprado directamente a productores de varias regiones de Ecuador, como
    Guayaquil, Tsachila, Montanita, Cotopaxi, Quitu y Yasuni. Aunque no es cacao arriba,
    es fino de aroma. Encontré sus tabletas en una tienda del Pasaje Arzobispal, ubicado
    en el corazón del centro histórico de Quito."
  leyenda: "[La Leyenda del Chocolate](http://chocoleyenda.com/) es algo que tengo
    que probar - ¡todavía no he comprado una tableta de esta marca!"
  winak: "[Wiñak](https://www.winak.org/) es otra empresa comunitaria asociada a Chakra,
    las mujeres y el chocolate. Al igual que con Tsatsayaku, aún no he encontrado
    ninguna de sus estanterías. Espero que el año que viene haya más novedades."
  victory: "[Victory Ecuadorian Product](https://www.victoryecuadorianproduct.com/)
    parece ser una pequeña empresa de chocolate ecuatoriano que comenzó en 2022 con
    bombones pralinés y también produce algunas tabletas de chocolate. En su página
    [Facebook](https://www.facebook.com/photo/?fbid=171233948834851&set=pcb.171234272168152),
    se menciona que utilizan cacao CCN51, la especie de cacao más común y productiva,
    pero eligen la más alta calidad, el fino de aroma. Encontramos sus tabletas en
    el café de una de las torres de la Basílica del Voto Nacional, en el centro histórico."
  viferchi: Lanzada en 2018 en Cuenca, [Viferchi](http://www.viferchi.com/) ofrece
    por el momento una pequeña variedad de bares. Lo conseguí en Quito, en la misma
    frutería de las barras de Cleo, en diciembre de 2021. Sin embargo, supongo que
    crecerá.
  malky: |-
    [Malky](https://www.facebook.com/yuramuyo/) es un proyecto del cual hay poca información disponible. Parece (aunque podría equivocarme) que se trata de una empresa fundada por una mujer Kichwa, Senaida Cerda, con el objetivo de apoyar a las mujeres en las comunidades de la Amazonía. Está vinculado, de cerca o de lejos, al proyecto [Woman of the Rio Napo](https://www.rainforestpartnership.org/projects/women-of-the-rio-napo) de Rainforest Partnership. Según el empaque de las tabletas, también hay una conexión con la empresa [Valenco](https://valenco.com.ec/), que produce, entre otras cosas, chocolate fino de aroma para chocolateros.

    Encontré una tableta en el Pasaje Arzobispal del centro histórico de Quito.
